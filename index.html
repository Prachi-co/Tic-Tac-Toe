<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="Ribbon">Fun Food Edition</div>
    <div class="PlayerBtns">
        <div id="Player1">PLAYER 1</div>
        <div id="Player2">PLAYER 2</div>
    </div>
    <div class="Choose">CHOOSE YOUR SYMBOL</div>
    <div class="Box">
        <div class="FoodBox">🍕</div>
        <div class="FoodBox">🍔</div>
        <div class="FoodBox">🌮</div>
        <div class="FoodBox">🌭</div>
        <div class="FoodBox">🌯</div>
        <div class="FoodBox">🥪</div>
    </div>
    <button id="nextBtn" disabled> Next</button>
    <div class="Box2">
        <div class="FoodBox2">🥞</div>
        <div class="FoodBox2">🧁</div>
        <div class="FoodBox2">🧇</div>
        <div class="FoodBox2">🍩</div>
        <div class="FoodBox2">🍪</div>
        <div class="FoodBox2">🍰</div>
    </div>
    <script src="HomePage.js"></script>
</body>
</html>
